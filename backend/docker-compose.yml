version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: curaayur-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: curaayur
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: curaayur-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - postgres

volumes:
  postgres_data:
